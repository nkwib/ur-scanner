<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Browser receiver for animated QR codes carrying BC-UR payloads. Camera to bytes, no wallet required. Pure decode core, pluggable frame sources, and a drop-in <ur-scanner> web component. All processing local, no telemetry."
    />
    <title>ur-scanner — receive animated BC-UR QR codes in the browser</title>

    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0e14" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ur-scanner" />
    <meta property="og:title" content="ur-scanner — receive animated BC-UR QR codes in the browser" />
    <meta
      property="og:description"
      content="Camera to bytes, no wallet required. Fountain-coded animated UR makes multi-KB transfer robust on lossy cameras. This is the receiving end the web lacked."
    />
    <meta property="og:url" content="https://ur-scanner-docs.pages.dev/" />
    <meta property="og:image" content="https://ur-scanner-docs.pages.dev/assets/demo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ur-scanner — receive animated BC-UR QR codes in the browser" />
    <meta
      name="twitter:description"
      content="Camera to bytes, no wallet required. Fountain-coded animated UR makes multi-KB transfer robust on lossy cameras."
    />
    <meta name="twitter:image" content="https://ur-scanner-docs.pages.dev/assets/demo.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
